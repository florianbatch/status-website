<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini CLI Status</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        html, body { background-color: #0f172a !important; color: #e2e8f0 !important; }
        .card { background-color: #1e293b !important; border-color: #334155 !important; padding: 1.25rem; border-radius: 0.75rem; border-width: 1px; }
        .label { color: #94a3b8 !important; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; }
        .value { color: #ffffff !important; font-size: 1.5rem; font-weight: 700; margin-top: 0.25rem; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <header class="mb-8 flex flex-col md:flex-row justify-between items-center border-b border-slate-800 pb-6 gap-4">
            <div>
                <h1 class="text-2xl font-bold text-white">Gemini CLI Dashboard</h1>
            </div>
            <div class="flex items-center space-x-4">
                <div class="flex items-center space-x-2 bg-slate-800/50 px-3 py-1 rounded-full border border-slate-700">
                    <div id="status-dot" class="h-2 w-2 rounded-full bg-slate-500"></div>
                    <span id="agent-status" class="text-xs font-medium text-slate-300 uppercase">IDLE</span>
                </div>
                <div class="flex items-center space-x-2 bg-slate-800/50 px-3 py-1 rounded-full border border-slate-700">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                    </span>
                    <span class="text-xs font-medium text-green-400 uppercase">Verbunden</span>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
            <div class="card"><p class="label">Total Tokens</p><p id="total-tokens-7d" class="value">0</p></div>
            <div class="card"><p class="label">Output (24h)</p><p id="tokens-output-24h" class="value">0</p></div>
            <div class="card"><p class="label">RPM</p><p id="rpm" class="value">0</p></div>
            <div class="card"><p class="label">TPM</p><p id="tpm" class="value">0</p></div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div class="card"><p class="label">CPU</p><p id="cpu" class="value">0%</p><div class="w-full bg-slate-700 rounded-full h-1.5 mt-2"><div id="cpu-bar" class="bg-blue-500 h-1.5 rounded-full transition-all duration-500" style="width: 0%"></div></div></div>
            <div class="card"><p class="label">RAM</p><p id="ram" class="value">0%</p><div class="w-full bg-slate-700 rounded-full h-1.5 mt-2"><div id="ram-bar" class="bg-blue-500 h-1.5 rounded-full transition-all duration-500" style="width: 0%"></div></div></div>
            <div class="card"><p class="label">Disk</p><p id="disk" class="value">0%</p><div class="w-full bg-slate-700 rounded-full h-1.5 mt-2"><div id="disk-bar" class="bg-blue-500 h-1.5 rounded-full transition-all duration-500" style="width: 0%"></div></div></div>
        </div>

        <div class="grid grid-cols-1 xl:grid-cols-2 gap-4">
            <div class="card">
                <h2 class="text-sm font-semibold text-white mb-4">Token Input Verlauf (24h)</h2>
                <div class="h-64"><canvas id="tokenChart"></canvas></div>
            </div>
            <div class="card">
                <h2 class="text-sm font-semibold text-white mb-4">Aktivitäts-Logbuch</h2>
                <div id="timeline" class="space-y-3 max-h-64 overflow-y-auto pr-2 text-xs"></div>
            </div>
        </div>
    </div>
    <script>
        let chart;
        const ctx = document.getElementById('tokenChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ data: [], borderColor: 'rgb(96, 165, 250)', backgroundColor: 'rgba(96, 165, 250, 0.05)', fill: true, tension: 0.8, cubicInterpolationMode: 'monotone', borderWidth: 3, pointRadius: 0 }] },
            options: { responsive: true, maintainAspectRatio: false, animation: false, plugins: { legend: { display: false }, tooltip: { enabled: true, intersect: false, mode: 'index' } }, scales: { y: { beginAtZero: true, grid: { display: false }, border: { display: false }, ticks: { color: 'rgb(148, 163, 184)', font: { size: 10 } } }, x: { grid: { display: false }, border: { display: false }, ticks: { display: false } } } }
        });

        async function update() {
            try {
                const res = await fetch('/api/metrics?t=' + Date.now());
                const data = await res.json();
                const format = (val) => Math.round(val).toLocaleString('de-DE');
                document.getElementById('total-tokens-7d').textContent = format(data.totalTokens7d);
                document.getElementById('tokens-output-24h').textContent = format(data.tokensOutput24h);
                document.getElementById('rpm').textContent = data.rpm;
                document.getElementById('tpm').textContent = format(data.tpm);
                document.getElementById('cpu').textContent = data.system.cpu + '%';
                document.getElementById('ram').textContent = data.system.ram + '%';
                document.getElementById('disk').textContent = data.system.disk + '%';
                const getBarColor = (p) => p < 70 ? 'bg-green-500' : (p < 90 ? 'bg-yellow-500' : 'bg-red-500');
                document.getElementById('cpu-bar').style.width = data.system.cpu + '%';
                document.getElementById('cpu-bar').className = `h-1.5 rounded-full transition-all duration-500 ${getBarColor(data.system.cpu)}`;
                document.getElementById('ram-bar').style.width = data.system.ram + '%';
                document.getElementById('ram-bar').className = `h-1.5 rounded-full transition-all duration-500 ${getBarColor(data.system.ram)}`;
                document.getElementById('disk-bar').style.width = data.system.disk + '%';
                document.getElementById('disk-bar').className = `h-1.5 rounded-full transition-all duration-500 ${getBarColor(data.system.disk)}`;
                const agent = data.agent;
                document.getElementById('agent-status').textContent = agent.status.toUpperCase();
                document.getElementById('status-dot').className = 'h-2 w-2 rounded-full ' + (agent.status === 'idle' ? 'bg-slate-500' : agent.status === 'thinking' ? 'bg-yellow-500 animate-pulse' : 'bg-blue-500 animate-pulse');
                document.getElementById('timeline').innerHTML = data.timeline.map(i => `<div class="flex gap-2"><span class="text-slate-500 font-mono">${i.time}</span><span class="text-white">${i.action}</span></div>`).join('');
                let firstDataIndex = data.chartData.findIndex(v => v > 0);
                chart.data.labels = firstDataIndex === -1 ? [data.labels[data.labels.length-1]] : data.labels.slice(firstDataIndex);
                chart.data.datasets[0].data = firstDataIndex === -1 ? [0] : data.chartData.slice(firstDataIndex);
                chart.update('none');
            } catch (e) { console.error(e); }
        }
        update(); setInterval(update, 1000);
    </script>
</body>
</html>
