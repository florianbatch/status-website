<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini CLI Status (Dark)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { @apply bg-[#0f172a] text-slate-200; }
        .card { @apply bg-[#1e293b] p-6 rounded-xl shadow-lg border border-slate-700/50; }
        .label { @apply text-xs font-semibold text-slate-400 uppercase tracking-wider; }
        .value { @apply text-3xl font-bold text-white mt-1; }
    </style>
</head>
<body class="min-h-screen p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-10 flex justify-between items-center border-b border-slate-800 pb-6">
            <div>
                <h1 class="text-3xl font-bold text-white">Gemini CLI Dashboard</h1>
                <p class="text-slate-400">Live-Metriken deiner API-Nutzung</p>
            </div>
            <div id="status-indicator" class="flex items-center space-x-2 bg-slate-800/50 px-3 py-1 rounded-full border border-slate-700">
                <span class="relative flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                </span>
                <span class="text-xs font-medium text-green-400 uppercase tracking-tight">Verbunden</span>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
            <div class="card">
                <p class="label">Total Tokens (7 Tage)</p>
                <p id="total-tokens-7d" class="value">0</p>
            </div>
            <div class="card">
                <p class="label">Token Output (24h)</p>
                <p id="tokens-output-24h" class="value">0</p>
            </div>
            <div class="card">
                <p class="label">RPM (Minute)</p>
                <p id="rpm" class="value">0</p>
            </div>
            <div class="card">
                <p class="label">TPM (Minute)</p>
                <p id="tpm" class="value">0</p>
            </div>
        </div>

        <div class="card">
            <h2 class="text-lg font-semibold text-white mb-6">Token Input Verlauf (24h)</h2>
            <div class="h-80">
                <canvas id="tokenChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        let chart;
        
        function initChart() {
            const ctx = document.getElementById('tokenChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Input Tokens',
                        data: [],
                        borderColor: 'rgb(96, 165, 250)', // Blue 400
                        backgroundColor: 'rgba(96, 165, 250, 0.1)',
                        fill: true,
                        tension: 0.4,
                        borderWidth: 2,
                        pointRadius: 3,
                        pointBackgroundColor: 'rgb(96, 165, 250)'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: { 
                            beginAtZero: true,
                            grid: { color: 'rgba(255, 255, 255, 0.05)' },
                            ticks: { color: 'rgb(148, 163, 184)' }
                        },
                        x: { 
                            grid: { display: false },
                            ticks: { color: 'rgb(148, 163, 184)' }
                        }
                    }
                }
            });
        }

        async function updateMetrics() {
            try {
                const response = await fetch('/api/metrics');
                const data = await response.json();

                document.getElementById('total-tokens-7d').textContent = data.totalTokens7d.toLocaleString();
                document.getElementById('tokens-output-24h').textContent = data.tokensOutput24h.toLocaleString();
                document.getElementById('rpm').textContent = data.rpm;
                document.getElementById('tpm').textContent = data.tpm.toLocaleString();

                chart.data.labels = data.labels;
                chart.data.datasets[0].data = data.chartData;
                chart.update('none');
                
                document.getElementById('status-indicator').classList.remove('opacity-50');
            } catch (error) {
                console.error('Update failed:', error);
                document.getElementById('status-indicator').classList.add('opacity-50');
            }
        }

        initChart();
        updateMetrics();
        setInterval(updateMetrics, 1000);
    </script>
</body>
</html>
