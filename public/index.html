<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini CLI Status - 24H</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Erzwungene Dark-Mode Styles via CSS (höhere Priorität als Tailwind Klassen) */
        html, body {
            background-color: #0f172a !important;
            color: #e2e8f0 !important;
        }
        .card {
            background-color: #1e293b !important;
            border-color: #334155 !important;
            padding: 1.5rem;
            border-radius: 0.75rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border-width: 1px;
        }
        .label {
            color: #94a3b8 !important;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .value {
            color: #ffffff !important;
            font-size: 1.875rem;
            font-weight: 700;
            margin-top: 0.25rem;
        }
        h1 { color: #ffffff !important; }
        p { color: #94a3b8 !important; }
    </style>
</head>
<body class="min-h-screen p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-10 flex justify-between items-center border-b border-slate-800 pb-6">
            <div>
                <h1 class="text-3xl font-bold">Gemini CLI Dashboard</h1>
                <p>Metriken der letzten 24 Stunden</p>
            </div>
            <div id="status-indicator" class="flex items-center space-x-2 bg-slate-800/50 px-3 py-1 rounded-full border border-slate-700">
                <span class="relative flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                </span>
                <span class="text-xs font-medium text-green-400 uppercase tracking-tight">Verbunden</span>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
            <div class="card">
                <p class="label">Total Tokens (7 Tage)</p>
                <p id="total-tokens-7d" class="value">0</p>
            </div>
            <div class="card">
                <p class="label">Token Output (24h)</p>
                <p id="tokens-output-24h" class="value">0</p>
            </div>
            <div class="card">
                <p class="label">RPM (Minute)</p>
                <p id="rpm" class="value">0</p>
            </div>
            <div class="card">
                <p class="label">TPM (Minute)</p>
                <p id="tpm" class="value">0</p>
            </div>
        </div>

        <div class="card">
            <h2 class="text-lg font-semibold text-white mb-6 text-center">Token Input Verlauf (24 Stunden)</h2>
            <div class="h-80">
                <canvas id="tokenChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        let chart;
        
        function initChart() {
            const ctx = document.getElementById('tokenChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Input Tokens',
                        data: [],
                        borderColor: 'rgb(96, 165, 250)',
                        backgroundColor: 'rgba(96, 165, 250, 0.05)',
                        fill: true,
                        tension: 0.8, // Wieder auf maximale Glätte
                        cubicInterpolationMode: 'monotone',
                        borderWidth: 5,
                        borderCapStyle: 'round',
                        borderJoinStyle: 'round',
                        pointRadius: 0,
                        pointHitRadius: 10,
                        pointHoverRadius: 6,
                        pointBackgroundColor: 'rgb(96, 165, 250)'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: false, // Deaktiviert das Hüpfen bei Updates
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            enabled: true,
                            intersect: false,
                            mode: 'index',
                            callbacks: {
                                label: function(context) {
                                    return ` ${Math.round(context.parsed.y).toLocaleString()} Tokens`;
                                }
                            }
                        }
                    },
                    scales: {
                        y: { 
                            beginAtZero: true,
                            grid: { display: false },
                            border: { display: false },
                            ticks: { color: 'rgb(148, 163, 184)' }
                        },
                        x: { 
                            grid: { display: false },
                            border: { display: false },
                            ticks: { display: false }
                        }
                    }
                }
            });
        }

        async function updateMetrics() {
            try {
                const response = await fetch('/api/metrics?t=' + Date.now());
                const data = await response.json();

                // Explizites Runden und deutsches Format (Punkt für Tausender, kein Komma)
                const format = (val) => Math.round(val).toLocaleString('de-DE');

                document.getElementById('total-tokens-7d').textContent = format(data.totalTokens7d);
                document.getElementById('tokens-output-24h').textContent = format(data.tokensOutput24h);
                document.getElementById('rpm').textContent = data.rpm;
                document.getElementById('tpm').textContent = format(data.tpm);

                // Glättungs-Funktion (Moving Average) für perfekt runde Bögen
                function smooth(values, windowSize) {
                    let result = [];
                    for (let i = 0; i < values.length; i++) {
                        let sum = 0;
                        let count = 0;
                        for (let j = Math.max(0, i - windowSize); j <= i; j++) {
                            sum += values[j];
                            count++;
                        }
                        result.push(sum / count);
                    }
                    return result;
                }

                // Glätte die 1.440 Minuten-Punkte
                const smoothedData = smooth(data.chartData, 10); 

                // Finde den ersten Index mit echtem Daten-Inhalt
                let firstDataIndex = data.chartData.findIndex(v => v > 0);
                
                if (firstDataIndex === -1) {
                    chart.data.labels = [data.labels[data.labels.length - 1]];
                    chart.data.datasets[0].data = [0];
                } else {
                    chart.data.labels = data.labels.slice(firstDataIndex);
                    chart.data.datasets[0].data = smoothedData.slice(firstDataIndex);
                }
                
                chart.update('none');
            } catch (error) {
                console.error('Update failed:', error);
            }
        }

        initChart();
        updateMetrics();
        setInterval(updateMetrics, 5000); // Alle 5 Sekunden reicht für 24h Übersicht
    </script>
</body>
</html>
